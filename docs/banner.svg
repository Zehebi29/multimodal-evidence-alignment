<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="100%" height="auto">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#111d3a"/>
      <stop offset="100%" style="stop-color:#0d1b33"/>
    </linearGradient>
    <linearGradient id="accentTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="50%" style="stop-color:#5b86e5"/>
      <stop offset="100%" style="stop-color:#00d2ff"/>
    </linearGradient>
    <linearGradient id="accentBottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff" stop-opacity="0.6"/>
      <stop offset="50%" style="stop-color:#5b86e5" stop-opacity="1"/>
      <stop offset="100%" style="stop-color:#00d2ff" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ccd6f6"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#5b86e5" opacity="0.08"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)"/>
  <rect width="1200" height="240" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentTop)"/>

  <!-- Subtle side accents -->
  <rect x="0" y="5" width="3" height="230" fill="url(#accentBottom)" opacity="0.4"/>
  <rect x="1197" y="5" width="3" height="230" fill="url(#accentBottom)" opacity="0.4"/>

  <!-- Medical cross (subtle background icon) -->
  <g transform="translate(60,50)" opacity="0.04">
    <rect x="20" y="0" width="40" height="120" rx="3" fill="#00d2ff"/>
    <rect x="0" y="40" width="80" height="40" rx="3" fill="#00d2ff"/>
  </g>

  <!-- Separator line -->
  <line x1="200" y1="135" x2="1000" y2="135" stroke="#5b86e5" stroke-width="0.5" opacity="0.15"/>

  <!-- Main title -->
  <text x="600" y="78" text-anchor="middle" fill="url(#textGlow)" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800" letter-spacing="4" filter="url(#glow)">MULTIMODAL EVIDENCE ALIGNMENT</text>

  <!-- MEA badge -->
  <rect x="542" y="100" width="116" height="28" rx="14" fill="none" stroke="#5b86e5" stroke-width="1.5" opacity="0.6"/>
  <text x="600" y="120" text-anchor="middle" fill="#8892b0" font-family="system-ui,monospace" font-size="16" font-weight="600" letter-spacing="8">M E A</text>

  <!-- Subtitle -->
  <text x="600" y="173" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="400" letter-spacing="2">Evidence-Grounded Uncertainty Detection for EUS Diagnosis</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="235" width="1200" height="5" fill="url(#accentBottom)"/>

  <!-- Tech pattern bottom-right -->
  <g transform="translate(1080,190)" opacity="0.06">
    <rect x="0" y="0" width="90" height="20" rx="3" fill="none" stroke="#00d2ff" stroke-width="1"/>
    <rect x="5" y="5" width="30" height="10" rx="2" fill="#00d2ff"/>
    <rect x="40" y="5" width="20" height="10" rx="2" fill="#00d2ff"/>
    <rect x="65" y="5" width="15" height="10" rx="2" fill="#00d2ff"/>
  </g>
</svg>
